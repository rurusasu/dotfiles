services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/openclaw:dev
    container_name: openclaw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_OAUTH_PORT:-1456}:1455" # OAuth callback port (default 1456 to avoid conflict with local codex login on 1455)

    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /home/app/.agents:size=1m,mode=0777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g
    cpus: 1.0

    user: "${OPENCLAW_UID:-1000}:${OPENCLAW_GID:-1000}"
    # Grant access to Docker socket (GID 0 on Docker Desktop WSL2) for built-in sandbox.
    group_add:
      - "0"

    environment:
      TZ: ${TZ:-Asia/Tokyo}
      HOME: /home/app
      # xAI Grok API key: injected via Docker secret (see secrets section below)
      PATH: /usr/local/share/pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GIT_ASKPASS: /usr/local/bin/git-credential-askpass.sh
      # Raise Node heap to avoid startup OOM with npm/Node runtime
      NODE_OPTIONS: --max-old-space-size=1536
      # Log level: info (default), debug, trace
      # trace includes sandbox exec I/O — safe here because sandbox has no secrets
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-trace}
      # Enable built-in sandbox (tool execution in sibling Docker containers)
      OPENCLAW_SANDBOX: "1"

    volumes:
      # Writable state dir for canvas, cron, etc. (read_only:true requires explicit writable mounts)
      - openclaw-home:/home/app/.openclaw
      # ACPX writes runtime state under ~/.acpx; mount it explicitly because /home/app is read-only.
      - openclaw-acpx:/home/app/.acpx
      # Docker-specific config template — entrypoint renders secrets into the writable home volume
      - ${OPENCLAW_CONFIG_FILE:?Set OPENCLAW_CONFIG_FILE in .env}:/app/openclaw.json.tmpl:ro
      - openclaw-data:/app/data
      # Gemini CLI OAuth credentials (oauth_creds.json + google_accounts.json).
      # Authenticate once on the host with `gemini`, then this mount keeps tokens refreshable.
      # Set GEMINI_CREDENTIALS_DIR in .env (e.g. C:/Users/<you>/.gemini).
      # Leave unset to use an empty volume — API key auth via GEMINI_API_KEY still works.
      - ${GEMINI_CREDENTIALS_DIR:-gemini-credentials}:/home/app/.gemini
      # Claude Code OAuth credentials (.credentials.json) and config (.claude.json).
      # Authenticate once on the host with `claude`, then this mount keeps tokens refreshable.
      # Set CLAUDE_CREDENTIALS_DIR in .env (e.g. C:/Users/<you>/.claude).
      # Leave unset to use an empty volume — API key auth via ANTHROPIC_API_KEY still works.
      - ${CLAUDE_CREDENTIALS_DIR:-claude-credentials}:/home/app/.claude
      # Claude Code expects $HOME/.claude.json at the HOME root (not inside .claude/).
      # Bind-mount the host file directly. Set CLAUDE_CONFIG_JSON in .env.
      - ${CLAUDE_CONFIG_JSON:-/dev/null}:/home/app/.claude.json:ro
      # Codex OAuth credentials (auth.json).
      # Authenticate once on the host with `codex login`, then this mount keeps tokens
      # available on container restart. Entrypoint copies tokens into auth-profiles.json
      # so OpenClaw manages its own refresh cycle independently.
      # Set CODEX_AUTH_FILE in .env (e.g. C:/Users/<you>/.codex/auth.json).
      # Leave unset to skip — OpenClaw can still auth via its own OAuth flow (port 1455).
      - ${CODEX_AUTH_FILE:-/dev/null}:/app/codex-auth.json:ro
      # Docker socket for built-in sandbox (sibling container spawning).
      # Required for agents.defaults.sandbox.mode != "off".
      # Security: grants ability to create/manage Docker containers on the host.
      - /var/run/docker.sock:/var/run/docker.sock

    secrets:
      - github_token
      - xai_api_key
    networks:
      - default
      - cognee-network

volumes:
  openclaw-data:
    driver: local
  openclaw-home:
    driver: local
  openclaw-acpx:
    driver: local
  # Fallback empty volume when GEMINI_CREDENTIALS_DIR is not set in .env
  gemini-credentials:
    driver: local
  # Fallback empty volume when CLAUDE_CREDENTIALS_DIR is not set in .env
  claude-credentials:
    driver: local

networks:
  default:
  cognee-network:
    external: true
    name: cognee-skills_cognee-network

secrets:
  github_token:
    file: ${OPENCLAW_GITHUB_TOKEN_FILE:?Set OPENCLAW_GITHUB_TOKEN_FILE in .env}
  xai_api_key:
    file: ${OPENCLAW_XAI_API_KEY_FILE:?Set OPENCLAW_XAI_API_KEY_FILE in .env}
