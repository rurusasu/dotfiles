services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/openclaw:dev
    container_name: openclaw
    restart: unless-stopped

    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18789"
      - "127.0.0.1:1455:1455" # OAuth callback port (required for onboard --auth-choice openai-codex)

    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0

    user: "${OPENCLAW_UID:-1000}:${OPENCLAW_GID:-1000}"

    environment:
      TZ: ${TZ:-Asia/Tokyo}
      # Optional: set OPENAI_API_KEY in .env for embeddings (not required for Codex OAuth)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Runtime bun installs (skills) go to the writable data volume
      BUN_INSTALL: /app/data/.bun
      PATH: /app/data/.bun/bin:/home/bun/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # GitHub HTTPS authentication via Fine-grained PAT (set in .env, stored in 1Password)
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # gh CLI uses GH_TOKEN for authentication (falls back to GITHUB_TOKEN)
      GH_TOKEN: ${GITHUB_TOKEN:-}
      GIT_ASKPASS: /usr/local/bin/git-credential-askpass.sh

    volumes:
      # Writable state dir for canvas, cron, etc. (read_only:true requires explicit writable mounts)
      - openclaw-home:/home/bun/.openclaw
      # Docker-specific config overlaid as read-only on top of the home volume
      - ${OPENCLAW_CONFIG_FILE:?Set OPENCLAW_CONFIG_FILE in .env}:/home/bun/.openclaw/openclaw.json:ro
      - openclaw-data:/app/data

volumes:
  openclaw-data:
    driver: local
  openclaw-home:
    driver: local
