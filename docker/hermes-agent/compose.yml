name: hermes-agent

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/hermes-agent-gh:latest
    container_name: hermes
    restart: unless-stopped
    shm_size: 1g
    command: gateway run
    ports:
      - "127.0.0.1:${HERMES_API_PORT:-8642}:8642"
      - "127.0.0.1:${HERMES_DASHBOARD_PORT:-9119}:9119"
    volumes:
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}
        target: /opt/data
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/.xurl
        target: /root/.xurl
    env_file:
      - path: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/.env
        format: raw
        required: false
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"

  researcher:
    profiles: ["researcher"]
    build:
      context: .
      dockerfile: Dockerfile
    image: local/hermes-agent-gh:latest
    container_name: hermes-researcher
    restart: unless-stopped
    shm_size: 1g
    command: gateway run
    ports:
      - "127.0.0.1:${HERMES_RESEARCHER_API_PORT:-8643}:8642"
      - "127.0.0.1:${HERMES_RESEARCHER_DASHBOARD_PORT:-9120}:9119"
    volumes:
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/profiles/researcher
        target: /opt/data
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/docs
        target: /opt/data/docs
        read_only: true
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/.xurl
        target: /root/.xurl
    env_file:
      - path: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/profiles/researcher/.env
        format: raw
        required: false
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"

  rick:
    profiles: ["rick"]
    build:
      context: .
      dockerfile: Dockerfile
    image: local/hermes-agent-gh:latest
    container_name: hermes-rick
    restart: unless-stopped
    shm_size: 1g
    command: gateway run
    ports:
      - "127.0.0.1:${HERMES_RICK_API_PORT:-8644}:8642"
      - "127.0.0.1:${HERMES_RICK_DASHBOARD_PORT:-9121}:9119"
    volumes:
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/profiles/rick
        target: /opt/data
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/docs
        target: /opt/data/docs
        read_only: true
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/.xurl
        target: /root/.xurl
    env_file:
      - path: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/profiles/rick/.env
        format: raw
        required: false
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"

  hoffman:
    profiles: ["hoffman"]
    build:
      context: .
      dockerfile: Dockerfile
    image: local/hermes-agent-gh:latest
    container_name: hermes-hoffman
    restart: unless-stopped
    shm_size: 1g
    command: gateway run
    ports:
      - "127.0.0.1:${HERMES_HOFFMAN_API_PORT:-8645}:8642"
      - "127.0.0.1:${HERMES_HOFFMAN_DASHBOARD_PORT:-9122}:9119"
    volumes:
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/profiles/hoffman
        target: /opt/data
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/docs
        target: /opt/data/docs
        read_only: true
      - type: bind
        source: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/.xurl
        target: /root/.xurl
    env_file:
      - path: ${HERMES_DATA_DIR:-${USERPROFILE:-${HOME}}/.hermes}/profiles/hoffman/.env
        format: raw
        required: false
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
