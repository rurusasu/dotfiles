services:
  cognee-mcp-skills:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TRANSPORT_MODE=http
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-gemini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-2-preview}
      - GRAPH_DATABASE_PROVIDER=falkordb
      - GRAPH_DATABASE_URL=falkordb
      - GRAPH_DATABASE_PORT=6379
      - VECTOR_DB_PROVIDER=lancedb
      - SKILL_HEALTH_WINDOW=${SKILL_HEALTH_WINDOW:-20}
      - SKILL_HEALTH_THRESHOLD=${SKILL_HEALTH_THRESHOLD:-0.7}
      - SKILL_CORRECTION_PENALTY=${SKILL_CORRECTION_PENALTY:-0.05}
    secrets:
      - gemini_api_key
    depends_on:
      falkordb:
        condition: service_healthy
    volumes:
      - ${SKILLS_PATH}:/skills:rw
      - openclaw-home:/openclaw-sessions:ro
    networks:
      - cognee-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  falkordb:
    image: falkordb/falkordb:v4.4.1
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cognee-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - cognee-network
    restart: unless-stopped

networks:
  cognee-network:
    driver: bridge

volumes:
  falkordb-data:
  ollama-data:
  openclaw-home:
    external: true
    name: openclaw_openclaw-home

secrets:
  gemini_api_key:
    file: ${OPENCLAW_GEMINI_API_KEY_FILE}
