version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    groups:
      actions-patch:
        update-types: ["patch"]
      actions-minor:
        update-types: ["minor"]
    labels:
      - "dependencies"
