name: Nix Checks

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/test-nix.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Check flake evaluation
        run: nix flake check --no-build

      - name: Build package sets
        run: |
          nix build .#minimal
          nix build .#default

      - name: Smoke test core tools
        run: |
          nix shell .#default --command bash -c '
            set -euo pipefail
            check() {
              local name=$1; shift
              local out
              out=$("$name" "$@" 2>&1) || { echo "FAIL $name (exit $?)"; exit 1; }
              echo "OK  $name: $out"
            }
            echo "=== Smoke testing core tools ==="
            check chezmoi --version
            check git --version
            check gh --version
            check fd --version
            check rg --version
            check bat --version
            check jq --version
            check eza --version
            check zoxide --version
            check fzf --version
            check unzip -v
            echo "=== All core tools OK ==="
          '

      - name: Check formatting
        run: nix fmt -- --fail-on-change
