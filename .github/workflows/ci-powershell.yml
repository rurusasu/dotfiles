name: PowerShell CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "install.cmd"
      - "scripts/powershell/**"
      - ".github/workflows/ci-nix.yml"
      - ".github/workflows/ci-nixos-wsl.yml"
      - ".github/workflows/ci-powershell.yml"
  pull_request:
    branches: [main]
    paths:
      - "install.cmd"
      - "scripts/powershell/**"
      - ".github/workflows/ci-nix.yml"
      - ".github/workflows/ci-nixos-wsl.yml"
      - ".github/workflows/ci-powershell.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (PSScriptAnalyzer)
    runs-on: windows-2025
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache PSScriptAnalyzer
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~\Documents\PowerShell\Modules\PSScriptAnalyzer
          key: ${{ runner.os }}-pssa-lint-1.22.0

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          function Invoke-WithRetry {
            param([scriptblock]$Script, [int]$Max = 3)
            for ($i = 1; $i -le $Max; $i++) {
              try { & $Script; return } catch {
                if ($i -eq $Max) { throw }
                Write-Warning "Attempt $i failed: $_. Retrying in $($i * 5)s..."
                Start-Sleep -Seconds ($i * 5)
              }
            }
          }

          $moduleRoot = Join-Path $HOME 'Documents\PowerShell\Modules'
          if ($env:PSModulePath -notlike "*$moduleRoot*") {
            $env:PSModulePath = "$moduleRoot;$env:PSModulePath"
          }

          function Install-GalleryModuleArchive {
            param([string]$Name, [string]$Version)

            $modulePath = Join-Path $moduleRoot "$Name\$Version"
            if (-not (Test-Path -LiteralPath (Join-Path $modulePath "$Name.psd1"))) {
              $packagePath = Join-Path $env:RUNNER_TEMP "$Name.$Version.zip"
              if (Test-Path -LiteralPath $modulePath) {
                Remove-Item -LiteralPath $modulePath -Recurse -Force
              }
              New-Item -ItemType Directory -Force -Path $modulePath | Out-Null
              $downloadParams = @{
                Uri             = "https://www.powershellgallery.com/api/v2/package/$Name/$Version"
                OutFile         = $packagePath
                UseBasicParsing = $true
              }
              Invoke-WithRetry {
                Invoke-WebRequest @downloadParams
              }
              Expand-Archive -LiteralPath $packagePath -DestinationPath $modulePath -Force
            }

            Import-Module -Name $Name -RequiredVersion $Version -Force
          }

          Install-GalleryModuleArchive -Name PSScriptAnalyzer -Version '1.22.0'

      - name: Run PSScriptAnalyzer and generate SARIF
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $settings = Join-Path $env:GITHUB_WORKSPACE 'scripts/powershell/PSScriptAnalyzerSettings.psd1'
          $findings = Invoke-ScriptAnalyzer -Path scripts/powershell -Recurse -Settings $settings

          $sevMap = @{ Error = 'error'; ParseError = 'error'; Warning = 'warning'; Information = 'note' }
          $results = [object[]]@(
            $findings | ForEach-Object {
              $uri = [System.IO.Path]::GetRelativePath($env:GITHUB_WORKSPACE, $_.ScriptPath).Replace('\', '/')
              @{
                ruleId    = $_.RuleName
                message   = @{ text = $_.Message }
                level     = $sevMap[$_.Severity.ToString()]
                locations = @(@{
                  physicalLocation = @{
                    artifactLocation = @{ uri = $uri; uriBaseId = '%SRCROOT%' }
                    region           = @{ startLine = [int]$_.Line; startColumn = [int]$_.Column }
                  }
                })
              }
            }
          )
          $sarif = @{
            '$schema' = 'https://json.schemastore.org/sarif-2.1.0.json'
            version   = '2.1.0'
            runs      = @(@{
              tool    = @{
                driver = @{
                  name           = 'PSScriptAnalyzer'
                  informationUri = 'https://github.com/PowerShell/PSScriptAnalyzer'
                  rules          = @()
                }
              }
              results = $results
            })
          }
          $sarif | ConvertTo-Json -Depth 10 | Set-Content pssa.sarif -Encoding UTF8
          Write-Host "SARIF: $(@($findings).Count) finding(s)"

          $errors = @($findings | Where-Object { $_.Severity -in 'Error','ParseError' }).Count
          Set-Content pssa_errors.txt $errors

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: pssa.sarif
          category: PSScriptAnalyzer

      - name: Fail on PSScriptAnalyzer errors
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path pssa_errors.txt)) {
            Write-Error "pssa_errors.txt not found — SARIF generation step likely failed"
            exit 1
          }
          $errors = [int](Get-Content pssa_errors.txt -Raw).Trim()
          if ($errors -gt 0) {
            Write-Error "PSScriptAnalyzer: $errors error(s) found"
            exit 1
          }

  test:
    name: Test (Pester + Codecov)
    runs-on: windows-2025
    timeout-minutes: 20
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache PowerShell modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-pester-5.6.1-pssa-1.22.0

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          function Invoke-WithRetry {
            param([scriptblock]$Script, [int]$Max = 3)
            for ($i = 1; $i -le $Max; $i++) {
              try { & $Script; return } catch {
                if ($i -eq $Max) { throw }
                Write-Warning "Attempt $i failed: $_. Retrying in $($i * 5)s..."
                Start-Sleep -Seconds ($i * 5)
              }
            }
          }

          $moduleRoot = Join-Path $HOME 'Documents\PowerShell\Modules'
          if ($env:PSModulePath -notlike "*$moduleRoot*") {
            $env:PSModulePath = "$moduleRoot;$env:PSModulePath"
          }

          function Install-GalleryModuleArchive {
            param([string]$Name, [string]$Version)

            $modulePath = Join-Path $moduleRoot "$Name\$Version"
            if (-not (Test-Path -LiteralPath (Join-Path $modulePath "$Name.psd1"))) {
              $packagePath = Join-Path $env:RUNNER_TEMP "$Name.$Version.zip"
              if (Test-Path -LiteralPath $modulePath) {
                Remove-Item -LiteralPath $modulePath -Recurse -Force
              }
              New-Item -ItemType Directory -Force -Path $modulePath | Out-Null
              $downloadParams = @{
                Uri             = "https://www.powershellgallery.com/api/v2/package/$Name/$Version"
                OutFile         = $packagePath
                UseBasicParsing = $true
              }
              Invoke-WithRetry {
                Invoke-WebRequest @downloadParams
              }
              Expand-Archive -LiteralPath $packagePath -DestinationPath $modulePath -Force
            }

            Import-Module -Name $Name -RequiredVersion $Version -Force
          }

          Install-GalleryModuleArchive -Name Pester -Version '5.6.1'
          Install-GalleryModuleArchive -Name PSScriptAnalyzer -Version '1.22.0'

      - name: Run tests
        shell: pwsh
        working-directory: scripts/powershell
        run: |
          $pesterConfig = New-PesterConfiguration
          $pesterConfig.Run.Path = "./tests"
          $pesterConfig.Run.ExcludePath = @("**/Integration.Tests.ps1")
          $pesterConfig.Run.PassThru = $true
          $pesterConfig.Output.Verbosity = "Detailed"

          # Code coverage — dynamic discovery
          $sourceFiles = @(
            Get-ChildItem ./lib      -Filter "*.ps1"         -ErrorAction SilentlyContinue
            Get-ChildItem ./handlers -Filter "Handler.*.ps1" -ErrorAction SilentlyContinue
          ) | Select-Object -ExpandProperty FullName

          if ($sourceFiles.Count -eq 0) {
            Write-Warning "Coverage disabled: no source files found under ./lib or ./handlers (PWD: $PWD)"
          }

          if ($sourceFiles.Count -gt 0) {
            $pesterConfig.CodeCoverage.Enabled = $true
            $pesterConfig.CodeCoverage.Path = $sourceFiles
            $pesterConfig.CodeCoverage.OutputPath = "coverage.xml"
            $pesterConfig.CodeCoverage.OutputFormat = "CoverageGutters"
          }

          # JUnit output for GitHub
          $pesterConfig.TestResult.Enabled = $true
          $pesterConfig.TestResult.OutputPath = "test-results.xml"
          $pesterConfig.TestResult.OutputFormat = "JUnitXml"

          $result = Invoke-Pester -Configuration $pesterConfig

          Write-Host ""
          Write-Host "=== Test Summary ===" -ForegroundColor Cyan
          Write-Host "Passed: $($result.PassedCount)" -ForegroundColor Green
          Write-Host "Failed: $($result.FailedCount)" -ForegroundColor $(if ($result.FailedCount -gt 0) { "Red" } else { "Gray" })
          Write-Host "Skipped: $($result.SkippedCount)" -ForegroundColor Yellow

          if ($result.CodeCoverage) {
            Write-Host ""
            Write-Host "=== Coverage ===" -ForegroundColor Cyan
            Write-Host "Coverage: $([math]::Round($result.CodeCoverage.CoveragePercent, 2))%"
          }

          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results
          path: |
            scripts/powershell/test-results.xml
            scripts/powershell/coverage.xml
          retention-days: 30
          if-no-files-found: warn

  test-windows-powershell:
    name: Test (Windows PowerShell 5.1 compatibility)
    runs-on: windows-2025
    timeout-minutes: 15
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache Windows PowerShell modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~\Documents\WindowsPowerShell\Modules
          key: ${{ runner.os }}-windows-powershell-pester-5.6.1

      - name: Install Pester for Windows PowerShell
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          function Invoke-WithRetry {
            param([scriptblock]$Script, [int]$Max = 3)
            for ($i = 1; $i -le $Max; $i++) {
              try { & $Script; return } catch {
                if ($i -eq $Max) { throw }
                Write-Warning "Attempt $i failed: $_. Retrying in $($i * 5)s..."
                Start-Sleep -Seconds ($i * 5)
              }
            }
          }

          [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol -bor [Net.SecurityProtocolType]::Tls12

          $moduleRoot = Join-Path $HOME 'Documents\WindowsPowerShell\Modules'
          if ($env:PSModulePath -notlike "*$moduleRoot*") {
            $env:PSModulePath = "$moduleRoot;$env:PSModulePath"
          }

          $pesterVersion = '5.6.1'
          $pesterPath = Join-Path $moduleRoot "Pester\$pesterVersion"
          if (-not (Test-Path -LiteralPath (Join-Path $pesterPath 'Pester.psd1'))) {
            $packagePath = Join-Path $env:RUNNER_TEMP "Pester.$pesterVersion.zip"
            if (Test-Path -LiteralPath $pesterPath) {
              Remove-Item -LiteralPath $pesterPath -Recurse -Force
            }
            New-Item -ItemType Directory -Force -Path $pesterPath | Out-Null
            $downloadParams = @{
              Uri             = "https://www.powershellgallery.com/api/v2/package/Pester/$pesterVersion"
              OutFile         = $packagePath
              UseBasicParsing = $true
            }
            Invoke-WithRetry {
              Invoke-WebRequest @downloadParams
            }
            Expand-Archive -LiteralPath $packagePath -DestinationPath $pesterPath -Force
          }

          Import-Module Pester -RequiredVersion $pesterVersion -Force

      - name: Run Invoke-ExternalCommand tests on Windows PowerShell
        shell: powershell
        working-directory: scripts/powershell/tests
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $runner = [scriptblock]::Create((Get-Content -LiteralPath .\Invoke-Tests.ps1 -Raw -Encoding UTF8))
          & $runner -Path .\lib\Invoke-ExternalCommand.Tests.ps1 -MinimumCoverage 0

      - name: Run install.cmd fallback without pwsh
        shell: powershell
        timeout-minutes: 5
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $workDir = Join-Path $env:RUNNER_TEMP 'install-cmd-fallback'
          $scriptDir = Join-Path $workDir 'scripts\powershell'
          if (Test-Path -LiteralPath $workDir) {
            Remove-Item -LiteralPath $workDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $scriptDir | Out-Null
          Copy-Item -LiteralPath install.cmd -Destination (Join-Path $workDir 'install.cmd')

          $stubInstall = @(
            '[CmdletBinding()]'
            'param('
            '  [switch]$NoPause,'
            '  [switch]$UserPhaseOnly'
            ')'
            ''
            'Write-Host "STUB_INSTALL_COMPLETE NoPause=$NoPause UserPhaseOnly=$UserPhaseOnly"'
            'Write-Host "User Phase Complete!"'
            'exit 0'
          ) -join [Environment]::NewLine
          [System.IO.File]::WriteAllText(
            (Join-Path $scriptDir 'install.ps1'),
            $stubInstall,
            [System.Text.UTF8Encoding]::new($false)
          )

          $oldDotfilesPs7Dir = $env:DOTFILES_PS7_DIR
          $oldPath = $env:PATH
          $missingPs7Dir = Join-Path $env:RUNNER_TEMP 'NoPowerShell7Dir'
          New-Item -ItemType Directory -Force -Path $missingPs7Dir | Out-Null

          try {
            $env:DOTFILES_PS7_DIR = $missingPs7Dir
            $env:PATH = @(
              Join-Path $env:SystemRoot 'System32'
              Join-Path $env:SystemRoot 'System32\WindowsPowerShell\v1.0'
              $env:SystemRoot
            ) -join ';'

            Push-Location $workDir
            try {
              $output = & cmd.exe /d /c install.cmd -NoPause -UserPhaseOnly 2>&1 | ForEach-Object {
                $line = [string]$_
                Write-Host $line
                $line
              }
              $exitCode = $LASTEXITCODE
            }
            finally {
              Pop-Location
            }
          }
          finally {
            if ($null -eq $oldDotfilesPs7Dir) {
              Remove-Item Env:\DOTFILES_PS7_DIR -ErrorAction SilentlyContinue
            }
            else {
              $env:DOTFILES_PS7_DIR = $oldDotfilesPs7Dir
            }
            $env:PATH = $oldPath
          }

          $out = $output -join [Environment]::NewLine
          if ($exitCode -ne 0) {
            throw "install.cmd fallback failed with exit code $exitCode"
          }
          if ($out -notmatch 'Falling back to Windows PowerShell') {
            throw 'install.cmd did not exercise the Windows PowerShell fallback path'
          }
          if ($out -notmatch 'STUB_INSTALL_COMPLETE') {
            throw 'install.cmd fallback did not execute the stub install script'
          }
          if ($out -notmatch 'User Phase Complete!') {
            throw 'install.cmd fallback did not reach the user phase completion marker'
          }
