name: PowerShell CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/powershell/**"
      - ".github/workflows/ci-powershell.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/powershell/**"
      - ".github/workflows/ci-powershell.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (PSScriptAnalyzer)
    runs-on: windows-2025
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache PSScriptAnalyzer
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~\Documents\PowerShell\Modules\PSScriptAnalyzer
          key: ${{ runner.os }}-pssa-lint-1.22.0

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer | Where-Object Version -eq '1.22.0')) {
            Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.22.0 -Scope CurrentUser -Force -Repository PSGallery
          }

      - name: Run PSScriptAnalyzer and generate SARIF
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $settings = Join-Path $env:GITHUB_WORKSPACE 'scripts/powershell/PSScriptAnalyzerSettings.psd1'
          $findings = Invoke-ScriptAnalyzer -Path scripts/powershell -Recurse -Settings $settings

          $sevMap = @{ Error = 'error'; ParseError = 'error'; Warning = 'warning'; Information = 'note' }
          $results = [object[]]@(
            $findings | ForEach-Object {
              $uri = [System.IO.Path]::GetRelativePath($env:GITHUB_WORKSPACE, $_.ScriptPath).Replace('\', '/')
              @{
                ruleId    = $_.RuleName
                message   = @{ text = $_.Message }
                level     = $sevMap[$_.Severity.ToString()]
                locations = @(@{
                  physicalLocation = @{
                    artifactLocation = @{ uri = $uri; uriBaseId = '%SRCROOT%' }
                    region           = @{ startLine = [int]$_.Line; startColumn = [int]$_.Column }
                  }
                })
              }
            }
          )
          $sarif = @{
            '$schema' = 'https://json.schemastore.org/sarif-2.1.0.json'
            version   = '2.1.0'
            runs      = @(@{
              tool    = @{
                driver = @{
                  name           = 'PSScriptAnalyzer'
                  informationUri = 'https://github.com/PowerShell/PSScriptAnalyzer'
                  rules          = @()
                }
              }
              results = $results
            })
          }
          $sarif | ConvertTo-Json -Depth 10 | Set-Content pssa.sarif -Encoding UTF8
          Write-Host "SARIF: $(@($findings).Count) finding(s)"

          $errors = @($findings | Where-Object { $_.Severity -in 'Error','ParseError' }).Count
          Set-Content pssa_errors.txt $errors

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: pssa.sarif
          category: PSScriptAnalyzer

      - name: Fail on PSScriptAnalyzer errors
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path pssa_errors.txt)) {
            Write-Error "pssa_errors.txt not found — SARIF generation step likely failed"
            exit 1
          }
          $errors = [int](Get-Content pssa_errors.txt -Raw).Trim()
          if ($errors -gt 0) {
            Write-Error "PSScriptAnalyzer: $errors error(s) found"
            exit 1
          }

  test:
    name: Test (Pester + Codecov)
    runs-on: windows-2025
    timeout-minutes: 20
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache PowerShell modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-pester-5.6.1-pssa-1.22.0

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          function Invoke-WithRetry {
            param([scriptblock]$Script, [int]$Max = 3)
            for ($i = 1; $i -le $Max; $i++) {
              try { & $Script; return } catch {
                if ($i -eq $Max) { throw }
                Write-Warning "Attempt $i failed: $_. Retrying in $($i * 5)s..."
                Start-Sleep -Seconds ($i * 5)
              }
            }
          }

          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Invoke-WithRetry { Install-Module -Name Pester           -RequiredVersion 5.6.1  -Scope CurrentUser -Force -Repository PSGallery }
          Invoke-WithRetry { Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.22.0 -Scope CurrentUser -Force -Repository PSGallery }

      - name: Run tests
        shell: pwsh
        working-directory: scripts/powershell
        run: |
          $pesterConfig = New-PesterConfiguration
          $pesterConfig.Run.Path = "./tests"
          $pesterConfig.Run.ExcludePath = @("**/Integration.Tests.ps1")
          $pesterConfig.Run.PassThru = $true
          $pesterConfig.Output.Verbosity = "Detailed"

          # Code coverage — dynamic discovery
          $sourceFiles = @(
            Get-ChildItem ./lib      -Filter "*.ps1"         -ErrorAction SilentlyContinue
            Get-ChildItem ./handlers -Filter "Handler.*.ps1" -ErrorAction SilentlyContinue
          ) | Select-Object -ExpandProperty FullName

          if ($sourceFiles.Count -eq 0) {
            Write-Warning "Coverage disabled: no source files found under ./lib or ./handlers (PWD: $PWD)"
          }

          if ($sourceFiles.Count -gt 0) {
            $pesterConfig.CodeCoverage.Enabled = $true
            $pesterConfig.CodeCoverage.Path = $sourceFiles
            $pesterConfig.CodeCoverage.OutputPath = "coverage.xml"
            $pesterConfig.CodeCoverage.OutputFormat = "CoverageGutters"
          }

          # JUnit output for GitHub
          $pesterConfig.TestResult.Enabled = $true
          $pesterConfig.TestResult.OutputPath = "test-results.xml"
          $pesterConfig.TestResult.OutputFormat = "JUnitXml"

          $result = Invoke-Pester -Configuration $pesterConfig

          Write-Host ""
          Write-Host "=== Test Summary ===" -ForegroundColor Cyan
          Write-Host "Passed: $($result.PassedCount)" -ForegroundColor Green
          Write-Host "Failed: $($result.FailedCount)" -ForegroundColor $(if ($result.FailedCount -gt 0) { "Red" } else { "Gray" })
          Write-Host "Skipped: $($result.SkippedCount)" -ForegroundColor Yellow

          if ($result.CodeCoverage) {
            Write-Host ""
            Write-Host "=== Coverage ===" -ForegroundColor Cyan
            Write-Host "Coverage: $([math]::Round($result.CodeCoverage.CoveragePercent, 2))%"
          }

          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results
          path: |
            scripts/powershell/test-results.xml
            scripts/powershell/coverage.xml
          retention-days: 30
          if-no-files-found: warn
