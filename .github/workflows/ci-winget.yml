name: Windows Environment Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "windows/winget/packages.json"
      - "windows/npm/packages.json"
      - "windows/pnpm/packages.json"
      - "nix/packages/sets.nix"
      - "nix/packages/winget.nix"
      - "install.cmd"
      - "scripts/powershell/install.ps1"
      - "scripts/powershell/install.user.ps1"
      - "scripts/powershell/handlers/Handler.Winget.ps1"
      - "scripts/powershell/handlers/Handler.Npm.ps1"
      - "scripts/powershell/handlers/Handler.Pnpm.ps1"
      - "scripts/powershell/handlers/Handler.Codex.ps1"
      - "scripts/powershell/handlers/Handler.ClaudeCode.ps1"
      - "scripts/powershell/handlers/Handler.Bun.ps1"
      - "scripts/powershell/lib/**"
      - ".github/workflows/ci-winget.yml"
  pull_request:
    branches: [main]
    paths:
      - "windows/winget/packages.json"
      - "windows/npm/packages.json"
      - "windows/pnpm/packages.json"
      - "nix/packages/sets.nix"
      - "nix/packages/winget.nix"
      - "install.cmd"
      - "scripts/powershell/install.ps1"
      - "scripts/powershell/install.user.ps1"
      - "scripts/powershell/handlers/Handler.Winget.ps1"
      - "scripts/powershell/handlers/Handler.Npm.ps1"
      - "scripts/powershell/handlers/Handler.Pnpm.ps1"
      - "scripts/powershell/handlers/Handler.Codex.ps1"
      - "scripts/powershell/handlers/Handler.ClaudeCode.ps1"
      - "scripts/powershell/handlers/Handler.Bun.ps1"
      - "scripts/powershell/lib/**"
      - ".github/workflows/ci-winget.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: windows-2025
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Bootstrap winget
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # Ensure winget is available on the runner
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            Write-Host "winget not found — installing Microsoft.WinGet.Client..."
            $ErrorActionPreference = 'Continue'
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -ErrorAction SilentlyContinue
            $ErrorActionPreference = 'Stop'
            Install-Module -Name Microsoft.WinGet.Client -Force -Repository PSGallery
            Repair-WinGetPackageManager -AllUsers
          }
          function Invoke-WingetSourceUpdate {
            param([int]$Attempts = 3)

            for ($attempt = 1; $attempt -le $Attempts; $attempt++) {
              Write-Host "winget source update attempt $attempt/$Attempts"
              $ErrorActionPreference = 'Continue'
              $sourceOutput = winget source update 2>&1 | ForEach-Object {
                $line = [string]$_
                Write-Host $line
                $line
              }
              $sourceUpdateExit = $LASTEXITCODE
              $ErrorActionPreference = 'Stop'

              $sourceText = $sourceOutput -join [Environment]::NewLine
              if ($sourceUpdateExit -eq 0 -and $sourceText -notmatch '(?im)\bCancelled\b') {
                return
              }

              Write-Warning "winget source update did not complete cleanly (exit=$sourceUpdateExit). Retrying after source reset."
              $ErrorActionPreference = 'Continue'
              winget source reset --force
              $ErrorActionPreference = 'Stop'
              Start-Sleep -Seconds 5
            }

            throw "winget source update did not complete after $Attempts attempts"
          }

          # Validate winget sources before proceeding. A textual "Cancelled"
          # with exit 0 still leaves later winget install calls unable to resolve
          # packages, so detect it explicitly.
          Invoke-WingetSourceUpdate
          winget --version
          winget source list

      - name: Run install.cmd strict user phase
        shell: pwsh
        timeout-minutes: 70
        env:
          DOTFILES_WINGET_COMMAND_TIMEOUT_SECONDS: "180"
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          Push-Location $env:GITHUB_WORKSPACE
          try {
            $ErrorActionPreference = 'Continue'
            $output = & cmd.exe /d /c install.cmd -NoPause -UserPhaseOnly -WingetVerifyCommandOnly 2>&1 |
              ForEach-Object {
                $line = [string]$_
                Write-Host $line
                $line
              }
            $exitCode = $LASTEXITCODE
            $ErrorActionPreference = 'Stop'
          }
          finally {
            Pop-Location
          }

          $out = $output -join [Environment]::NewLine

          if ($exitCode -ne 0) {
            throw "install.cmd strict user phase failed with exit code $exitCode"
          }
          if ($out -notmatch 'User Phase Complete!') {
            throw 'install.cmd did not reach the user phase completion marker'
          }
