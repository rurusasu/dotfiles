name: Windows Environment Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "windows/winget/packages.json"
      - "windows/npm/packages.json"
      - "windows/pnpm/packages.json"
      - "nix/packages/sets.nix"
      - "nix/packages/winget.nix"
      - "install.cmd"
      - "scripts/powershell/install.ps1"
      - "scripts/powershell/install.user.ps1"
      - "scripts/powershell/handlers/Handler.Winget.ps1"
      - "scripts/powershell/handlers/Handler.Npm.ps1"
      - "scripts/powershell/handlers/Handler.Pnpm.ps1"
      - "scripts/powershell/handlers/Handler.Codex.ps1"
      - "scripts/powershell/handlers/Handler.ClaudeCode.ps1"
      - "scripts/powershell/handlers/Handler.Bun.ps1"
      - "scripts/powershell/lib/**"
      - ".github/workflows/ci-winget.yml"
  pull_request:
    branches: [main]
    paths:
      - "windows/winget/packages.json"
      - "windows/npm/packages.json"
      - "windows/pnpm/packages.json"
      - "nix/packages/sets.nix"
      - "nix/packages/winget.nix"
      - "install.cmd"
      - "scripts/powershell/install.ps1"
      - "scripts/powershell/install.user.ps1"
      - "scripts/powershell/handlers/Handler.Winget.ps1"
      - "scripts/powershell/handlers/Handler.Npm.ps1"
      - "scripts/powershell/handlers/Handler.Pnpm.ps1"
      - "scripts/powershell/handlers/Handler.Codex.ps1"
      - "scripts/powershell/handlers/Handler.ClaudeCode.ps1"
      - "scripts/powershell/handlers/Handler.Bun.ps1"
      - "scripts/powershell/lib/**"
      - ".github/workflows/ci-winget.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: windows-2025
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bootstrap winget
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # Ensure winget is available on the runner
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            Write-Host "winget not found — installing Microsoft.WinGet.Client..."
            $ErrorActionPreference = 'Continue'
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -ErrorAction SilentlyContinue
            $ErrorActionPreference = 'Stop'
            Install-Module -Name Microsoft.WinGet.Client -Force -Repository PSGallery
            Repair-WinGetPackageManager -AllUsers
          }
          # Validate winget is functional before proceeding.
          # source update can return non-zero on transient CDN errors; treat as warning.
          # Temporarily suspend Stop preference so native command stderr doesn't abort.
          $ErrorActionPreference = 'Continue'
          winget source update
          $sourceUpdateExit = $LASTEXITCODE
          $ErrorActionPreference = 'Stop'
          if ($sourceUpdateExit -ne 0) {
            Write-Warning "winget source update returned $sourceUpdateExit — continuing anyway"
          }
          winget --version

      - name: Run install.cmd strict user phase
        shell: pwsh
        timeout-minutes: 70
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $stdout = Join-Path $env:RUNNER_TEMP 'install-cmd.stdout.log'
          $stderr = Join-Path $env:RUNNER_TEMP 'install-cmd.stderr.log'
          $proc = Start-Process -FilePath 'cmd.exe' `
            -ArgumentList @('/d', '/c', 'install.cmd', '-NoPause', '-UserPhaseOnly', '-WingetVerifyCommandOnly') `
            -WorkingDirectory $env:GITHUB_WORKSPACE `
            -RedirectStandardOutput $stdout `
            -RedirectStandardError $stderr `
            -WindowStyle Hidden `
            -PassThru

          if (-not $proc.WaitForExit(60 * 60 * 1000)) {
            taskkill.exe /PID $proc.Id /T /F | Out-Null
            if (Test-Path $stdout) { Get-Content $stdout }
            if (Test-Path $stderr) { Get-Content $stderr }
            throw 'install.cmd strict user phase timed out before completion'
          }

          $out = if (Test-Path $stdout) { Get-Content $stdout -Raw } else { '' }
          $err = if (Test-Path $stderr) { Get-Content $stderr -Raw } else { '' }
          if ($out) { Write-Host $out }
          if ($err) { Write-Warning $err }

          if ($proc.ExitCode -ne 0) {
            throw "install.cmd strict user phase failed with exit code $($proc.ExitCode)"
          }
          if ($out -notmatch 'User Phase Complete!') {
            throw 'install.cmd did not reach the user phase completion marker'
          }
