name: Chezmoi CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "chezmoi/**"
      - ".github/workflows/ci-chezmoi.yml"
  pull_request:
    branches: [main]
    paths:
      - "chezmoi/**"
      - ".github/workflows/ci-chezmoi.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Pester chezmoi)
    runs-on: windows-2025
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache PowerShell modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-pester-5.6.1

      - name: Install Pester
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable Pester | Where-Object Version -eq '5.6.1')) {
            Install-Module -Name Pester -RequiredVersion 5.6.1 -Scope CurrentUser -Force -Repository PSGallery
          }

      - name: Validate chezmoi templates
        shell: pwsh
        working-directory: scripts/powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          .\tests\Invoke-Tests.ps1 -Path .\tests\chezmoi -MinimumCoverage 0

  fmt:
    name: Format (.tmpl BOM check)
    runs-on: windows-2025
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check .tmpl files for BOM
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Recurse -Filter "*.tmpl" ./chezmoi
          $violations = [System.Collections.Generic.List[string]]::new()
          foreach ($f in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($f.FullName)
            if ($bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
              $violations.Add($f.FullName)
            }
          }
          if ($violations.Count -gt 0) {
            Write-Error "BOM detected in $($violations.Count) file(s):`n$($violations -join "`n")"
            exit 1
          }
          Write-Host "BOM check passed: $(@($files).Count) .tmpl file(s) checked"

  test:
    name: Test (Pester + Codecov)
    runs-on: windows-2025
    timeout-minutes: 20
    needs: [lint, fmt]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache PowerShell modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-pester-5.6.1

      - name: Install Pester
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          function Invoke-WithRetry {
            param([scriptblock]$Script, [int]$Max = 3)
            for ($i = 1; $i -le $Max; $i++) {
              try { & $Script; return } catch {
                if ($i -eq $Max) { throw }
                Write-Warning "Attempt $i failed: $_. Retrying in $($i * 5)s..."
                Start-Sleep -Seconds ($i * 5)
              }
            }
          }

          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Invoke-WithRetry { Install-Module -Name Pester -RequiredVersion 5.6.1 -Scope CurrentUser -Force -Repository PSGallery }

      - name: Run tests
        shell: pwsh
        working-directory: scripts/powershell
        run: |
          $pesterConfig = New-PesterConfiguration
          $pesterConfig.Run.Path = "./tests/chezmoi"
          $pesterConfig.Run.PassThru = $true
          $pesterConfig.Output.Verbosity = "Detailed"

          # JUnit output for GitHub
          $pesterConfig.TestResult.Enabled = $true
          $pesterConfig.TestResult.OutputPath = "test-results.xml"
          $pesterConfig.TestResult.OutputFormat = "JUnitXml"

          $result = Invoke-Pester -Configuration $pesterConfig

          Write-Host ""
          Write-Host "=== Test Summary ===" -ForegroundColor Cyan
          Write-Host "Passed: $($result.PassedCount)" -ForegroundColor Green
          Write-Host "Failed: $($result.FailedCount)" -ForegroundColor $(if ($result.FailedCount -gt 0) { "Red" } else { "Gray" })
          Write-Host "Skipped: $($result.SkippedCount)" -ForegroundColor Yellow

          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: chezmoi-test-results
          path: scripts/powershell/test-results.xml
          retention-days: 30
          if-no-files-found: warn

  op-guard:
    # Behavioral guard for the "op present but unauthenticated" environment
    # (devcontainers, CI, fresh clones). The static Pester lint only checks
    # that onepasswordRead is wrapped in *a* guard; it cannot tell whether the
    # guard is strong enough. Here we put a stub `op` on PATH that simulates
    # the binary being installed with no account signed in, then render every
    # template that calls onepasswordRead and require each to succeed. A guard
    # that only checks `lookPath "op"` would call `op read` and fail — which is
    # exactly the regression this job catches (see the self-check step).
    name: Render guard (op unauthenticated)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install chezmoi
        run: |
          set -euo pipefail
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install stub op (present but unauthenticated)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/op" <<'STUB'
          #!/usr/bin/env bash
          # Simulate 1Password CLI installed but with no account signed in.
          [ "${1:-}" = "account" ] && [ "${2:-}" = "list" ] && exit 0   # empty list, success
          [ "${1:-}" = "--version" ] && { echo "0.0.0-stub"; exit 0; }
          echo "[stub op] no 1Password account found (unauthenticated)" >&2
          exit 1
          STUB
          chmod +x "$HOME/.local/bin/op"

      - name: Render every onepasswordRead template (must succeed)
        run: |
          set -euo pipefail
          src="$PWD/chezmoi"
          chezmoi init --source "$src"
          fail=0
          while IFS= read -r f; do
            if ! chezmoi --source "$src" execute-template < "$f" >/dev/null 2>/tmp/te.err; then
              rel="${f#"$src"/}"
              echo "::error file=chezmoi/${rel}::onepasswordRead failed while op is unauthenticated — the guard is insufficient (must skip the read when the account is not signed in)"
              sed 's/^/    /' /tmp/te.err
              fail=1
            fi
          done < <(grep -rl --include='*.tmpl' -E '\{\{[^}]*onepasswordRead' "$src")
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "OK  all onepasswordRead templates render cleanly with op present but unauthenticated"

      - name: Self-check (a lookPath-only guard must be caught)
        run: |
          set -uo pipefail
          src="$PWD/chezmoi"
          weak='{{ if lookPath "op" }}{{ onepasswordRead "op://Private/Kaggle/c4patuuzwob2vcwt43qqphoyeu" .op_account_personal }}{{ end }}'
          if printf '%s' "$weak" | chezmoi --source "$src" execute-template >/dev/null 2>&1; then
            echo "::error::self-check failed: a lookPath-only guard rendered successfully, so this job would not catch the original bug class"
            exit 1
          fi
          echo "OK  weak lookPath-only guard correctly fails under unauthenticated op"
