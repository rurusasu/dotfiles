name: PowerShell Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/powershell/**"
      - ".github/workflows/test-powershell.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/powershell/**"
      - ".github/workflows/test-powershell.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache PowerShell modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-pester-5.6.1-pssa-1.22.0

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          function Invoke-WithRetry {
            param([scriptblock]$Script, [int]$Max = 3)
            for ($i = 1; $i -le $Max; $i++) {
              try { & $Script; return } catch {
                if ($i -eq $Max) { throw }
                Write-Warning "Attempt $i failed: $_. Retrying in $($i * 5)s..."
                Start-Sleep -Seconds ($i * 5)
              }
            }
          }

          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Invoke-WithRetry { Install-Module -Name Pester           -RequiredVersion 5.6.1  -Scope CurrentUser -Force -Repository PSGallery }
          Invoke-WithRetry { Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.22.0 -Scope CurrentUser -Force -Repository PSGallery }

      - name: Run tests
        shell: pwsh
        working-directory: scripts/powershell
        run: |
          $pesterConfig = New-PesterConfiguration
          $pesterConfig.Run.Path = "./tests"
          $pesterConfig.Run.ExcludePath = @("**/Integration.Tests.ps1")
          $pesterConfig.Run.PassThru = $true
          $pesterConfig.Output.Verbosity = "Detailed"

          # Code coverage — dynamic discovery
          $sourceFiles = @(
            Get-ChildItem ./lib      -Filter "*.ps1"         -ErrorAction SilentlyContinue
            Get-ChildItem ./handlers -Filter "Handler.*.ps1" -ErrorAction SilentlyContinue
          ) | Select-Object -ExpandProperty FullName

          if ($sourceFiles.Count -eq 0) {
            Write-Warning "Coverage disabled: no source files found under ./lib or ./handlers (PWD: $PWD)"
          }

          if ($sourceFiles.Count -gt 0) {
            $pesterConfig.CodeCoverage.Enabled = $true
            $pesterConfig.CodeCoverage.Path = $sourceFiles
            $pesterConfig.CodeCoverage.OutputPath = "coverage.xml"
            $pesterConfig.CodeCoverage.OutputFormat = "CoverageGutters"
          }

          # JUnit output for GitHub
          $pesterConfig.TestResult.Enabled = $true
          $pesterConfig.TestResult.OutputPath = "test-results.xml"
          $pesterConfig.TestResult.OutputFormat = "JUnitXml"

          $result = Invoke-Pester -Configuration $pesterConfig

          # Output summary
          Write-Host ""
          Write-Host "=== Test Summary ===" -ForegroundColor Cyan
          Write-Host "Passed: $($result.PassedCount)" -ForegroundColor Green
          Write-Host "Failed: $($result.FailedCount)" -ForegroundColor $(if ($result.FailedCount -gt 0) { "Red" } else { "Gray" })
          Write-Host "Skipped: $($result.SkippedCount)" -ForegroundColor Yellow

          if ($result.CodeCoverage) {
            Write-Host ""
            Write-Host "=== Coverage ===" -ForegroundColor Cyan
            Write-Host "Coverage: $([math]::Round($result.CodeCoverage.CoveragePercent, 2))%"
          }

          if ($result.FailedCount -gt 0) {
            exit 1
          }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: scripts/powershell/coverage.xml
          flags: powershell
          name: powershell-coverage
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results
          path: |
            scripts/powershell/test-results.xml
            scripts/powershell/coverage.xml
          retention-days: 30
          if-no-files-found: warn
