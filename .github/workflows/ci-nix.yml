name: Nix CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/ci-nix.yml"
  pull_request:
    branches: [main]
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/ci-nix.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (statix)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run statix
        run: |
          # statix exits non-zero when findings exist; capture that separately from infra errors.
          # stderr is preserved so build/infra failures surface in logs.
          nix shell nixpkgs#statix --command \
            statix check --format json . > statix.json || STATIX_EXIT=$?
          echo "statix_exit=${STATIX_EXIT:-0}" >> "$GITHUB_ENV"

      - name: Convert to SARIF
        run: |
          python3 - << 'PYEOF'
          import json, sys

          # statix --format json emits one JSON object per file on separate lines (NDJSON),
          # e.g. {"file":"a.nix","report":[...]}\n{"file":"b.nix","report":[...]}\n
          # Parse line-by-line to avoid JSONDecodeError on multi-file output.
          SEV_MAP = {"Error": "error", "Warn": "warning", "Hint": "note"}
          data = []
          error_count = 0
          try:
              with open("statix.json") as f:
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          data.append(json.loads(line))
                      except json.JSONDecodeError as e:
                          print(f"Warning: skipping unparseable line: {e}", file=sys.stderr)
          except FileNotFoundError:
              print("Warning: statix.json not found — empty SARIF will be uploaded", file=sys.stderr)

          results = []
          for item in data:
              file_path = item.get("file", "")
              for check in item.get("report", []):
                  note = check.get("note", "")
                  severity = check.get("severity", "Warn")
                  level = SEV_MAP.get(severity, "warning")
                  for diag in check.get("diagnostics", []):
                      at = diag.get("at", {})
                      frm = at.get("from", {})
                      to = at.get("to", {})
                      if severity in ("Error", "Warn"):
                          error_count += 1
                      results.append({
                          "ruleId": "statix/lint",
                          "message": {"text": f"{note}: {diag.get('message', '')}".strip(": ")},
                          "level": level,
                          "locations": [{
                              "physicalLocation": {
                                  "artifactLocation": {
                                      "uri": file_path,
                                      "uriBaseId": "%SRCROOT%"
                                  },
                                  "region": {
                                      "startLine": max(1, frm.get("line", 1)),
                                      "startColumn": max(1, frm.get("column", 1)),
                                      "endLine": max(1, to.get("line", 1)),
                                      "endColumn": max(1, to.get("column", 1))
                                  }
                              }
                          }]
                      })

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "statix",
                          "informationUri": "https://github.com/nerdypepper/statix",
                          "rules": []
                      }
                  },
                  "results": results
              }]
          }
          with open("statix.sarif", "w") as f:
              json.dump(sarif, f, indent=2)
          print(f"SARIF: {len(results)} finding(s), {error_count} error(s)")

          with open("statix_errors.txt", "w") as f:
              f.write(str(error_count))
          PYEOF

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: statix.sarif
          category: statix

      - name: Fail on statix errors
        run: |
          errors=$(cat statix_errors.txt 2>/dev/null || echo "0")
          if [ "$errors" -gt 0 ]; then
            echo "statix: $errors error(s) found"
            exit 1
          fi

  fmt:
    name: Format (nix fmt)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: nix fmt -- --fail-on-change

  test:
    name: Test (flake check + build + smoke)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [lint, fmt]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check flake evaluation
        run: |
          set -o pipefail
          nix flake check --no-build 2>&1 | tee /tmp/nix-check.txt
          if grep -q "evaluation warning" /tmp/nix-check.txt; then
            echo "ERROR: evaluation warnings found"
            exit 1
          fi

      - name: Build package sets
        run: |
          nix build .#minimal
          nix build .#default

      - name: Smoke test core tools
        run: |
          nix shell .#default --command bash -c '
            set -euo pipefail
            check() {
              local name=$1; shift
              local out
              out=$("$name" "$@" 2>&1) || { echo "FAIL $name (exit $?)"; exit 1; }
              echo "OK  $name: $out"
            }
            echo "=== Smoke testing core tools ==="
            check chezmoi --version
            check git --version
            check gh --version
            check fd --version
            check rg --version
            check bat --version
            check jq --version
            check eza --version
            check zoxide --version
            check fzf --version
            check unzip -v
            echo "=== All core tools OK ==="
          '
