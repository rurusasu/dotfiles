name: devcontainer CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bootstrap.sh"
      - ".devcontainer/**"
      - ".github/workflows/ci-devcontainer.yml"
  pull_request:
    branches: [main]
    paths:
      - "bootstrap.sh"
      - ".devcontainer/**"
      - ".github/workflows/ci-devcontainer.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-nix:
    name: E2E (Linux + Nix CLI)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install devcontainer CLI
        run: |
          nix profile install 'nixpkgs#devcontainer'
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"

      - name: Start devcontainer
        run: |
          devcontainer up \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder .

      - name: Smoke test
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/smoke.sh

      - name: bats unit tests
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/bats.sh

      - name: tmux + nvim headless E2E
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/e2e.sh

  macos:
    name: E2E (macOS)
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Docker (Colima)
        run: |
          brew install colima docker
          colima start --cpu 2 --memory 4

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Start devcontainer
        run: |
          devcontainer up \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder .

      - name: Smoke test
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/smoke.sh

      - name: bats unit tests
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/bats.sh

      - name: tmux + nvim headless E2E
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/e2e.sh

  windows:
    name: E2E (Windows)
    runs-on: windows-2025
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Switch Docker to Linux containers
        shell: pwsh
        run: |
          & 'C:\Program Files\Docker\Docker\DockerCli.exe' -SwitchLinuxEngine
          Start-Sleep 15

      - name: Install devcontainer CLI
        shell: pwsh
        run: npm install -g @devcontainers/cli

      - name: Start devcontainer
        shell: bash
        run: |
          devcontainer up \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder .

      - name: Smoke test
        shell: bash
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/smoke.sh

      - name: bats unit tests
        shell: bash
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/bats.sh

      - name: tmux + nvim headless E2E
        shell: bash
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/e2e.sh
