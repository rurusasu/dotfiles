name: devcontainer CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bootstrap.sh"
      - "install.sh"
      - "scripts/sh/install-macos.sh"
      - "scripts/sh/dcnvim.sh"
      - "tests/bash/**"
      - ".devcontainer/**"
      - ".github/workflows/ci-devcontainer.yml"
  pull_request:
    branches: [main]
    paths:
      - "bootstrap.sh"
      - "install.sh"
      - "scripts/sh/install-macos.sh"
      - "scripts/sh/dcnvim.sh"
      - "tests/bash/**"
      - ".devcontainer/**"
      - ".github/workflows/ci-devcontainer.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-nix:
    name: E2E (Linux + Nix CLI)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install devcontainer CLI
        run: |
          for attempt in 1 2 3; do
            if nix profile install 'nixpkgs#devcontainer'; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "nix profile install devcontainer failed after $attempt attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "nix profile install devcontainer failed; retrying in ${sleep_seconds}s (${attempt}/3)" >&2
            sleep "$sleep_seconds"
          done
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"

      - name: Start devcontainer
        run: |
          devcontainer up \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder .

      - name: Smoke test
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/smoke.sh

      - name: bats unit tests
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/bats.sh

      - name: tmux + nvim headless E2E
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/e2e.sh

  macos:
    name: E2E (macOS)
    runs-on: macos-15-intel
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Start devcontainer
        run: |
          devcontainer up \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder .

      - name: Smoke test
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/smoke.sh

      - name: bats unit tests
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/bats.sh

      - name: tmux + nvim headless E2E
        run: |
          devcontainer exec \
            --config .devcontainer/ci/devcontainer.json \
            --workspace-folder . \
            -- bash .devcontainer/ci/e2e.sh

  windows:
    # Full devcontainer E2E requires Linux containers, which GitHub-hosted
    # Windows runners do not support (no Docker Desktop, no WSL2 Ubuntu
    # pre-installed). This job validates the devcontainer configuration and
    # bootstrap.sh syntax without starting a container.
    name: Config Validation (Windows)
    runs-on: windows-2025
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install devcontainer CLI
        shell: pwsh
        run: npm install -g @devcontainers/cli

      - name: Validate devcontainer config
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          devcontainer read-configuration `
            --config .devcontainer/ci/devcontainer.json `
            --workspace-folder . | ConvertFrom-Json | Out-Null
          Write-Host "OK  devcontainer config is valid"
          exit 0
