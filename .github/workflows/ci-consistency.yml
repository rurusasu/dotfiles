name: Package Consistency

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "nix/packages/**"
      - "nix/flakes/**"
      - "nix/home/**"
      - "flake.nix"
      - "flake.lock"
      - "windows/winget/packages.json"
      - "windows/npm/packages.json"
      - "windows/pnpm/packages.json"
      - ".github/workflows/ci-consistency.yml"
  pull_request:
    branches: [main]
    paths:
      - "nix/packages/**"
      - "nix/flakes/**"
      - "nix/home/**"
      - "flake.nix"
      - "flake.lock"
      - "windows/winget/packages.json"
      - "windows/npm/packages.json"
      - "windows/pnpm/packages.json"
      - ".github/workflows/ci-consistency.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0

      - name: Verify package provider coverage
        run: |
          nix build .#package-support-report -o /tmp/package-support-report
          jq -e 'length == 0' /tmp/package-support-report/errors.json

      - name: Build winget-export from SSOT
        run: nix build .#winget-export -o /tmp/winget-export

      - name: Verify winget packages.json is in sync
        shell: bash
        run: |
          normalize='
            .Sources |= sort_by(.SourceDetails.Name)
            | .Sources |= map(.Packages |= sort_by(.PackageIdentifier))
          '
          diff \
            <(jq -S "$normalize" /tmp/winget-export/winget/packages.json) \
            <(jq -S "$normalize" windows/winget/packages.json)

      - name: Verify npm packages.json is in sync
        shell: bash
        run: diff <(jq -S . /tmp/winget-export/npm/packages.json) <(jq -S . windows/npm/packages.json)

      - name: Verify pnpm packages.json is in sync
        shell: bash
        run: diff <(jq -S . /tmp/winget-export/pnpm/packages.json) <(jq -S . windows/pnpm/packages.json)
