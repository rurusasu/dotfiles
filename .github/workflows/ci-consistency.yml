name: Package Consistency

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "nix/packages/**"
      - "nix/flakes/**"
      - "nix/home/**"
      - "flake.nix"
      - "flake.lock"
      - "windows/winget/packages.json"
      - "windows/pnpm/packages.json"
      - ".github/workflows/ci-consistency.yml"
  pull_request:
    branches: [main]
    paths:
      - "nix/packages/**"
      - "nix/flakes/**"
      - "nix/home/**"
      - "flake.nix"
      - "flake.lock"
      - "windows/winget/packages.json"
      - "windows/pnpm/packages.json"
      - ".github/workflows/ci-consistency.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Build winget-export from SSOT
        run: nix build .#winget-export -o /tmp/winget-export

      - name: Verify winget packages.json is in sync
        shell: bash
        run: |
          normalize='
            .Sources |= sort_by(.SourceDetails.Name)
            | .Sources |= map(.Packages |= sort_by(.PackageIdentifier))
          '
          diff \
            <(jq -S "$normalize" /tmp/winget-export/winget/packages.json) \
            <(jq -S "$normalize" windows/winget/packages.json)

      - name: Verify pnpm packages.json is in sync
        shell: bash
        run: diff <(jq -S . /tmp/winget-export/pnpm/packages.json) <(jq -S . windows/pnpm/packages.json)
