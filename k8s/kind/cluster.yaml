kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: learning
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri"]
      enable_cdi = true
      cdi_spec_dirs = ["/etc/cdi"]
nodes:
  - role: control-plane
    image: kindest/node:v1.35.1
  - role: control-plane
    image: kindest/node:v1.35.1
  - role: control-plane
    image: kindest/node:v1.35.1
  - role: worker
    image: kindest/node:v1.35.1
    labels:
      ingress-ready: "true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
    image: kindest/node:v1.35.1
  # GPU worker: CDI spec and WSL libs mounted from host
  - role: worker
    image: kindest/node:v1.35.1
    extraMounts:
      - hostPath: /etc/cdi
        containerPath: /etc/cdi
      - hostPath: /usr/lib/wsl/lib
        containerPath: /usr/lib/wsl/lib
