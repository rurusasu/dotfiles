# https://taskfile.dev
version: "3"

vars:
  DISTRO: NixOS
  DOTFILES_PATH: ~/.dotfiles

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ===========================================
  # Formatting & Linting (via NixOS)
  # ===========================================
  fmt:
    desc: Run nix fmt (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && nix fmt"

  fmt:check:
    desc: Check formatting without changes (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && nix fmt -- --fail-on-change"

  lint:
    desc: Run pre-commit on all files (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && pre-commit run --all-files"

  # ===========================================
  # Sync (chezmoi re-add)
  # ===========================================
  skills:sync:
    desc: Sync openclaw skills from deployed ~/.claude/skills/ back to chezmoi source
    cmds:
      - chezmoi re-add ~/.claude/skills/
    status:
      - chezmoi diff ~/.claude/skills/ | grep -qv .

  # ===========================================
  # Git Operations (via NixOS)
  # ===========================================
  commit:
    desc: Sync skills, format, lint, and commit (via WSL)
    vars:
      MSG: '{{.CLI_ARGS | default "update"}}'
    cmds:
      - task: skills:sync
      - task: fmt
      - task: lint
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && git add -A && git commit -m '{{.MSG}}'"

  push:
    desc: Push to remote (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && git push"

  sync:
    desc: Format, lint, commit and push (via WSL)
    vars:
      MSG: '{{.CLI_ARGS | default "update"}}'
    cmds:
      - task: commit -- "{{.MSG}}"
      - task: push

  # ===========================================
  # NixOS Operations
  # ===========================================
  rebuild:
    desc: Run nixos-rebuild switch (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && sudo nixos-rebuild switch --flake . --impure"

  build:
    desc: Dry build NixOS configuration (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && nix build .#nixosConfigurations.nixos.config.system.build.toplevel --dry-run"

  update:
    desc: Update flake inputs (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && nix flake update"

  # ===========================================
  # Development
  # ===========================================
  shell:
    desc: Enter NixOS shell
    cmds:
      - wsl -d {{.DISTRO}}

  dev:
    desc: Enter nix develop shell (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && nix develop"

  # ===========================================
  # Testing
  # ===========================================
  test:
    desc: Run PowerShell tests
    cmds:
      - pwsh -NoProfile -Command "& ./scripts/powershell/tests/Invoke-Tests.ps1 -MinimumCoverage 0 -IncludeIntegration"

  test:coverage:
    desc: Run PowerShell tests with coverage
    cmds:
      - pwsh -NoProfile -Command "& ./scripts/powershell/tests/Invoke-Tests.ps1 -IncludeIntegration"

  test:entrypoint:
    desc: Run openclaw entrypoint.sh shell tests
    cmds:
      - bash docker/openclaw/tests/test-entrypoint.sh

  sandbox:explain:
    desc: Show effective sandbox configuration
    cmds:
      - docker exec openclaw openclaw sandbox explain

  sandbox:build:
    desc: Build sandbox Docker images from OpenClaw upstream + custom layer
    vars:
      SBX_BASE: openclaw-sandbox:bookworm-slim
      SBX_COMMON_BASE: openclaw-sandbox-common:bookworm-slim-base
      SBX_COMMON: openclaw-sandbox-common:bookworm-slim
      SBX_REPO: https://raw.githubusercontent.com/openclaw/openclaw/main
      BUILD_DIR: '{{.TEMP | default "/tmp"}}/openclaw-sandbox-build'
    cmds:
      - cmd: mkdir -p "{{.BUILD_DIR}}"
      - cmd: curl -fsSL "{{.SBX_REPO}}/Dockerfile.sandbox" -o "{{.BUILD_DIR}}/Dockerfile.sandbox"
      - cmd: curl -fsSL "{{.SBX_REPO}}/Dockerfile.sandbox-common" -o "{{.BUILD_DIR}}/Dockerfile.sandbox-common"
      - cmd: >-
          docker build -t "{{.SBX_BASE}}"
          -f "{{.BUILD_DIR}}/Dockerfile.sandbox"
          "{{.BUILD_DIR}}/"
      - cmd: >-
          docker build -t "{{.SBX_COMMON_BASE}}"
          --build-arg BASE_IMAGE={{.SBX_BASE}}
          --build-arg "PACKAGES=curl wget jq coreutils grep nodejs npm python3 git ca-certificates unzip"
          --build-arg INSTALL_PNPM=1
          --build-arg INSTALL_BUN=1
          --build-arg INSTALL_BREW=0
          --build-arg FINAL_USER=root
          -f "{{.BUILD_DIR}}/Dockerfile.sandbox-common"
          "{{.BUILD_DIR}}/"
      # Custom layer: uv, gh CLI, Playwright, git config
      - cmd: >-
          docker build -t "{{.SBX_COMMON}}"
          --build-arg SBX_COMMON_BASE={{.SBX_COMMON_BASE}}
          -f docker/openclaw/Dockerfile.sandbox-custom
          docker/openclaw/

  sandbox:ps:
    desc: List running sandbox containers
    cmds:
      - docker ps --filter "ancestor=openclaw-sandbox-common:bookworm-slim"

  sandbox:logs:
    desc: Tail logs from all running sandbox containers
    vars:
      SBX_IMAGE: openclaw-sandbox-common:bookworm-slim
    cmds:
      - bash -c 'for id in $(docker ps -q --filter "ancestor={{.SBX_IMAGE}}"); do name=$(docker inspect --format "{{ "{{" }}.Name{{ "}}" }}" "$id"); docker logs -f --tail 50 "$id" 2>&1 | sed "s|^|[$name] |" & done; wait'

  sandbox:logs:all:
    desc: Dump full logs from all sandbox containers (including stopped)
    vars:
      SBX_IMAGE: openclaw-sandbox-common:bookworm-slim
    cmds:
      - bash -c 'for id in $(docker ps -aq --filter "ancestor={{.SBX_IMAGE}}"); do name=$(docker inspect --format "{{ "{{" }}.Name{{ "}}" }}" "$id"); status=$(docker inspect --format "{{ "{{" }}.State.Status{{ "}}" }}" "$id"); echo "=== $name ($status) ==="; docker logs "$id" 2>&1; echo; done'

  sandbox:exec:
    desc: Open a shell in a running sandbox container (use -- <container-name-substring>)
    cmds:
      - bash -c 'match=$(docker ps --filter "ancestor=openclaw-sandbox-common:bookworm-slim" --format "{{ "{{" }}.Names{{ "}}" }}" | grep -m1 "{{.CLI_ARGS}}"); if [ -z "$match" ]; then echo "No sandbox container matching \"{{.CLI_ARGS}}\""; docker ps --filter "ancestor=openclaw-sandbox-common:bookworm-slim" --format "  {{ "{{" }}.Names{{ "}}" }}"; exit 1; fi; echo "Attaching to $match"; docker exec -it "$match" /bin/bash'

  sandbox:history:
    desc: Show recent exec commands in sandbox containers (via docker events)
    cmds:
      - docker events --filter "type=container" --filter "image=openclaw-sandbox-common:bookworm-slim" --filter "event=exec_start" --since 1h

  sandbox:prune:
    desc: Remove all sandbox containers (orphans included)
    prompt: This will kill and remove all sandbox containers. Continue?
    cmds:
      - bash -c 'ids=$(docker ps -aq --filter "ancestor=openclaw-sandbox-common:bookworm-slim"); if [ -z "$ids" ]; then echo "No sandbox containers found"; else docker rm -f $ids; fi'

  sandbox:gc:
    desc: Remove exited sandbox containers (safety net for orphans)
    cmds:
      - bash -c 'ids=$(docker ps -aq --filter "ancestor=openclaw-sandbox-common:bookworm-slim" --filter "status=exited"); if [ -z "$ids" ]; then echo "No exited sandbox containers"; else echo "Removing $ids"; docker rm $ids; fi'

  sandbox:cache-init:
    desc: Initialize sandbox cache directories on gateway
    preconditions:
      - sh: docker ps -q -f name=^openclaw$ | grep -q .
        msg: "Gateway container 'openclaw' is not running. Start it first."
    cmds:
      - docker exec openclaw mkdir -p
        /app/data/workspace/.cache/uv
        /app/data/workspace/.cache/pnpm
        /app/data/workspace/.cache/bun
        /app/data/workspace/.cache/npm

  sandbox:cache-clean:
    desc: Remove all sandbox package caches
    prompt: This will delete all cached packages. Continue?
    cmds:
      - docker exec openclaw rm -rf
        /app/data/workspace/.cache/uv
        /app/data/workspace/.cache/pnpm
        /app/data/workspace/.cache/bun
        /app/data/workspace/.cache/npm
      - task: sandbox:cache-init

  # ===========================================
  # Windows Setup
  # ===========================================
  install:
    desc: Run Windows installer
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/powershell/install.ps1

  chezmoi:
    desc: Apply chezmoi dotfiles
    cmds:
      - chezmoi apply --source {{.TASKFILE_DIR}}/chezmoi

  # ===========================================
  # Git Hooks
  # ===========================================
  hooks:install:
    desc: Install pre-commit git hooks (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && pre-commit install --install-hooks"
    sources:
      - .pre-commit-config.yaml

  hooks:uninstall:
    desc: Uninstall pre-commit git hooks (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && pre-commit uninstall"

  hooks:check:
    desc: Run all pre-commit hooks manually on all files (via WSL)
    cmds:
      - wsl -d {{.DISTRO}} -- bash -lc "cd {{.DOTFILES_PATH}} && pre-commit run --all-files"
