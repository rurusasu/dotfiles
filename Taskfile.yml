# https://taskfile.dev
version: "3"

vars:
  DISTRO: NixOS
  DOTFILES_PATH: ~/.dotfiles
  HERMES_COMPOSE_FILE: docker/hermes-agent/compose.yml
  # OS は go-task の特殊変数なのでドット無しで参照する（`.OS` は常に空になり、
  # Windows から実行しても WSL プレフィックスが付かず失敗する）。
  WSL: '{{if eq OS "windows"}}wsl -d {{.DISTRO}} -- {{end}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ===========================================
  # Formatting & Linting (via NixOS)
  # ===========================================
  fmt:
    desc: Run nix fmt
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && nix fmt"'

  fmt:check:
    desc: Check formatting without changes
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && nix fmt -- --fail-on-change"'

  lint:
    desc: Run pre-commit on all files
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && pre-commit run --all-files"'

  # ===========================================
  # Sync (chezmoi re-add)
  # ===========================================
  skills:sync:
    desc: Sync Claude Code skills from deployed ~/.claude/skills/ back to chezmoi source
    cmds:
      - chezmoi re-add ~/.claude/skills/
    status:
      - chezmoi diff ~/.claude/skills/ | grep -qv .

  # ===========================================
  # Git Operations (via NixOS)
  # ===========================================
  commit:
    desc: Sync skills, format, lint, and commit
    vars:
      MSG: '{{.CLI_ARGS | default "update"}}'
    env:
      GIT_COMMIT_MSG: "{{.MSG}}"
      WSLENV: "GIT_COMMIT_MSG"
    cmds:
      - task: skills:sync
      - task: fmt
      - task: lint
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && git add -A && printf ''%s\n'' \"$GIT_COMMIT_MSG\" | git commit -F -"'

  push:
    desc: Push to remote
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && git push"'

  sync:
    desc: Format, lint, commit and push
    vars:
      MSG: '{{.CLI_ARGS | default "update"}}'
    cmds:
      - task: commit -- "{{.MSG}}"
      - task: push

  # ===========================================
  # NixOS Operations
  # ===========================================
  rebuild:
    desc: Run nixos-rebuild switch
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && nix flake update && sudo nixos-rebuild switch --flake . --impure"'

  build:
    desc: Dry build NixOS configuration
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && nix build .#nixosConfigurations.nixos.config.system.build.toplevel --dry-run"'

  update:
    desc: Update flake inputs
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && nix flake update"'

  # ===========================================
  # Development
  # ===========================================
  shell:
    desc: Enter NixOS shell
    cmds:
      - cmd: wsl -d {{.DISTRO}}
        platforms: [windows]
      - cmd: echo "Already in NixOS shell"
        platforms: [linux, darwin]

  dev:
    desc: Enter nix develop shell
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && nix develop"'

  # ===========================================
  # Testing
  # ===========================================
  test:
    desc: Run PowerShell tests
    cmds:
      - pwsh -NoProfile -Command "& ./scripts/powershell/tests/Invoke-Tests.ps1 -MinimumCoverage 0 -IncludeIntegration"

  test:coverage:
    desc: Run PowerShell tests with coverage
    cmds:
      - pwsh -NoProfile -Command "& ./scripts/powershell/tests/Invoke-Tests.ps1 -IncludeIntegration"

  test:bash:
    desc: Run bats unit tests for shell helpers
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && bats tests/bash"'

  # ===========================================
  # Windows Setup
  # ===========================================
  install:
    desc: Run Windows installer
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/powershell/install.ps1

  chezmoi:
    desc: Apply chezmoi dotfiles (NixOS + Windows)
    cmds:
      - cmd: wsl -d {{.DISTRO}} -- chezmoi apply --force
        platforms: [windows]
      - chezmoi apply --force
      - cmd: cmd.exe /c "chezmoi apply --force"
        platforms: [linux, darwin]

  # ===========================================
  # Docker
  # ===========================================
  docker:prune:
    desc: "DESTRUCTIVE: Remove all unused Docker images, containers, networks, and build cache"
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker system prune -a --force

  docker:compact:
    desc: "Prune Docker objects and compact VHDX to reclaim SSD space (requires admin)"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File windows/compact-docker-vhd.ps1 -Force

  docker:compact:schedule:
    desc: Register weekly Windows Scheduled Task to auto-compact Docker VHDX (requires admin)
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File windows/register-docker-compact-task.ps1

  hermes:setup:
    desc: Run Hermes Agent setup wizard in Docker
    interactive: true
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
      - sh: test -f {{.HERMES_COMPOSE_FILE}}
        msg: "Hermes compose file not found: {{.HERMES_COMPOSE_FILE}}"
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} run --rm hermes setup

  hermes:bootstrap:
    desc: Bootstrap the Hermes runtime through the supported host adapter
    cmds:
      - cmd: bash -lc 'set -euo pipefail; source scripts/sh/install-common.sh; source scripts/sh/hermes-agent.sh; dotfiles_hermes_start_stack docker "{{.HERMES_COMPOSE_FILE}}"'
        platforms: [linux, darwin]
      - cmd: pwsh -NoProfile -File scripts/powershell/hermes-bootstrap.ps1
        platforms: [windows]

  hermes:bootstrap:test:
    desc: Run the Hermes bootstrap container, gh wrapper, and provenance suites
    vars:
      PROVENANCE_REPOSITORY: '{{.HERMES_HOME_PROVENANCE_REPOSITORY | default "../hermes-home-profile-sync"}}'
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker build --target hermes-bootstrap-test -t local/hermes-bootstrap-test docker/hermes-agent
      - docker/hermes-agent/bootstrap/tests/test_gh_wrapper.sh
      - cmd: python docker/hermes-agent/bootstrap/tests/profile_sync_provenance_gate_contract.py
        platforms: [windows]
      - cmd: python3 docker/hermes-agent/bootstrap/tests/profile_sync_provenance_gate_contract.py
        platforms: [linux, darwin]
      - cmd: python docker/hermes-agent/bootstrap/tests/verify_profile_sync_provenance.py verify --dotfiles-repository . --source-repository "{{.PROVENANCE_REPOSITORY}}"
        platforms: [windows]
      - cmd: python3 docker/hermes-agent/bootstrap/tests/verify_profile_sync_provenance.py verify --dotfiles-repository . --source-repository "{{.PROVENANCE_REPOSITORY}}"
        platforms: [linux, darwin]

  hermes:bootstrap:config:
    desc: Validate the Hermes bootstrap Compose configuration
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f docker/hermes-agent/compose.yml config --quiet

  hermes:pull:
    desc: Rebuild the Hermes Agent Docker images with the latest base images
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} build --pull hermes chromium browser-mcp

  hermes:up:
    desc: Start Hermes Agent gateway and dashboard in Docker
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} up -d --force-recreate

  hermes:down:
    desc: Stop Hermes Agent Docker container
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} down

  hermes:restart:
    desc: Recreate Hermes Agent Docker container
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} up -d --force-recreate hermes

  hermes:logs:
    desc: Follow Hermes Agent Docker logs
    interactive: true
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} logs -f --tail=100 hermes

  hermes:browser:pull:
    desc: Rebuild Hermes browser and Browser MCP Docker images
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} build --pull chromium browser-mcp

  hermes:browser:restart:
    desc: Recreate Hermes browser and Browser MCP containers
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} up -d --force-recreate chromium browser-mcp

  hermes:browser:logs:
    desc: Follow Hermes browser and Browser MCP Docker logs
    interactive: true
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} logs -f --tail=100 chromium browser-mcp

  hermes:browser:ps:
    desc: Show Hermes browser and Browser MCP container status
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} ps chromium browser-mcp

  hermes:rick:up:
    desc: Start Rick Hermes profile gateway in the Hermes container
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} up -d hermes
      - docker exec hermes /opt/hermes/.venv/bin/hermes -p rick gateway start

  hermes:rick:down:
    desc: Stop Rick Hermes profile gateway
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker exec hermes /opt/hermes/.venv/bin/hermes -p rick gateway stop

  hermes:rick:restart:
    desc: Restart Rick Hermes profile gateway
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker exec hermes /opt/hermes/.venv/bin/hermes -p rick gateway restart

  hermes:rick:logs:
    desc: Follow Rick Hermes gateway logs
    interactive: true
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker exec hermes sh -lc 'tail -F /opt/data/logs/gateways/rick/current'

  hermes:hoffman:up:
    desc: Start Hoffman Hermes profile gateway in the Hermes container
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} up -d hermes
      - docker exec hermes /opt/hermes/.venv/bin/hermes -p hoffman gateway start

  hermes:hoffman:down:
    desc: Stop Hoffman Hermes profile gateway
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker exec hermes /opt/hermes/.venv/bin/hermes -p hoffman gateway stop

  hermes:hoffman:restart:
    desc: Restart Hoffman Hermes profile gateway
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker exec hermes /opt/hermes/.venv/bin/hermes -p hoffman gateway restart

  hermes:hoffman:logs:
    desc: Follow Hoffman Hermes gateway logs
    interactive: true
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker exec hermes sh -lc 'tail -F /opt/data/logs/gateways/hoffman/current'

  hermes:risarisa:up:
    desc: Start RisaRisa Hermes profile gateway in the Hermes container
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} up -d hermes
      - docker exec hermes /opt/hermes/.venv/bin/hermes -p risarisa gateway start

  hermes:risarisa:down:
    desc: Stop RisaRisa Hermes profile gateway
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker exec hermes /opt/hermes/.venv/bin/hermes -p risarisa gateway stop

  hermes:risarisa:restart:
    desc: Restart RisaRisa Hermes profile gateway
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker exec hermes /opt/hermes/.venv/bin/hermes -p risarisa gateway restart

  hermes:risarisa:logs:
    desc: Follow RisaRisa Hermes gateway logs
    interactive: true
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker exec hermes sh -lc 'tail -F /opt/data/logs/gateways/risarisa/current'

  hermes:ps:
    desc: Show Hermes Agent Docker container status
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - docker compose -f {{.HERMES_COMPOSE_FILE}} ps

  hermes:upgrade:
    desc: Rebuild and recreate Hermes Agent Docker container
    preconditions:
      - sh: docker info
        msg: "Docker daemon is not running. Start Docker Desktop and try again."
    cmds:
      - task: hermes:pull
      - task: hermes:up

  # ===========================================
  # Git Hooks
  # ===========================================
  hooks:install:
    desc: Install pre-commit git hooks
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && pre-commit install --install-hooks"'
    sources:
      - .pre-commit-config.yaml

  hooks:uninstall:
    desc: Uninstall pre-commit git hooks
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && pre-commit uninstall"'

  hooks:check:
    desc: Run all pre-commit hooks manually on all files
    cmds:
      - '{{.WSL}}bash -lc "cd {{.DOTFILES_PATH}} && pre-commit run --all-files"'
