# OpenClaw shared configuration data
# Referenced by: openclaw.docker.json.tmpl
# Tuning parameters extracted for cross-config reuse and easy adjustment.
#
# NOTE: Secrets (tokens, API keys) are NOT stored here.
#       They are resolved via 1Password (onepasswordRead) in templates.

openclaw:
  # --- Model configuration ---
  models:
    primary: "openai-codex/gpt-5.3-codex"
    fallback: "openai-codex/gpt-5.4"
    image: "openai-codex/gpt-5.4"
    pdf: "anthropic/claude-sonnet-4-6"
    subagent: "openai-codex/gpt-5.4"

  # --- Agent-specific model overrides ---
  agentModels:
    claude:
      primary: "anthropic/claude-sonnet-4-6"
    gemini:
      primary: "google/gemini-3.1-flash-lite"

  # --- Gateway ---
  gateway:
    port: 41789

  # --- Agent defaults ---
  agent:
    maxConcurrent: 4
    timeoutSeconds: 600
    contextTokens: 200000
    thinkingDefault: "low"

  # --- Subagent limits ---
  subagent:
    maxConcurrent: 8
    maxSpawnDepth: 2
    maxChildrenPerAgent: 5
    runTimeoutSeconds: 300
    archiveAfterMinutes: 30

  # --- Workspace host path ---
  # ホスト上のワークスペースディレクトリ（Docker Engine が直接解決できるパス）。
  # gateway と sandbox の両方が同じ物理ディレクトリを参照するために必要。
  # named volume ではなく bind mount を使うことで、sibling コンテナ間のパスマッピング不一致を回避する。
  # hostPath:    Docker Compose 用（Windows パス形式）。docker-compose.yml の bind mount に使用。
  # sandboxPath: OpenClaw sandbox binds 用（POSIX パス形式）。sandbox が Docker Engine に渡すパス。
  #              Docker Desktop WSL2 では /c/Users/... 形式を使う。
  #              注意: /mnt/c/ は Docker VM 内で Windows FS にマップされない。
  #                    /run/desktop/... は OpenClaw が /run をブロックするため使えない。
  #                    C:/ は POSIX パスとして拒否される。
  workspace:
    hostPath: "C:/Users/rurus/openclaw-workspace"
    sandboxPath: "/c/Users/rurus/openclaw-workspace"

  # --- Sandbox resource limits ---
  sandbox:
    pidsLimit: 256
    memory: "1g"
    memorySwap: "2g"
    cpus: 1

  # --- Compaction tuning ---
  compaction:
    reserveTokensFloor: 24000
    memoryFlushSoftThreshold: 150000

  # --- Context pruning ---
  contextPruning:
    ttl: "1h"
    keepLastAssistants: 3
    softTrimRatio: 0.3
    hardClearRatio: 0.5

  # --- Tool exec limits ---
  tools:
    execTimeoutSec: 120
    execBackgroundMs: 30000
    execCleanupMs: 5000
    webFetchMaxChars: 50000

  # --- Session maintenance ---
  session:
    idleMinutes: 60
    pruneAfter: "7d"
    maxEntries: 1000

  # --- Message queue ---
  messages:
    queueDebounceMs: 1500
    inboundDebounceMs: 800

  # --- Sandbox prune ---
  prune:
    idleHours: 6

  # --- Channel defaults ---
  channels:
    telegramHistoryLimit: 50
    slackHistoryLimit: 100
    slackThreadInitialHistoryLimit: 50

  # --- Slack per-channel agents ---
  # 「1エージェント = 1チャンネル」設計: 各チャンネルに専用エージェント（ACP経由 Claude Code）を割り当て、
  # コンテキストの混入を防止する。すべて ACP 経由が必須（Claude Max の直接モデル指定は Consumer ToS 違反）。
  #
  # このリストから openclaw.docker.json.tmpl が以下を自動生成する:
  #   - agents.list: 各チャンネル専用エージェント（独立 workspace）
  #   - bindings:    peer.kind="channel" でチャンネル ID ベースのルーティング
  #   - channels.slack.channels: requireMention 設定
  #
  # チャンネルの追加・削除はここだけ編集すればよい。テンプレート側の変更は不要。
  #
  # id:        エージェントID（agents.list + bindings で使用）
  # channelId: Slack チャンネル ID（bindings.match.peer.id + channels.slack.channels で使用）
  slackAgents:
    - id: "slack-c0ak3sqkfv2"
      channelId: "C0AK3SQKFV2"
    - id: "slack-c0ak70nle6s"
      channelId: "C0AK70NLE6S"
    - id: "slack-c0ak64upvnw"
      channelId: "C0AK64UPVNW"
    - id: "slack-c0ajvdkgn6a"
      channelId: "C0AJVDKGN6A"
    - id: "slack-c0ajzspv84s"
      channelId: "C0AJZSPV84S"
