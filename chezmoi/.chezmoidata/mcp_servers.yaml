# Unified MCP Server Configuration
# Used by: Claude Code, Codex CLI, Cursor, Gemini CLI
#
# Each tool has different config formats, so templates convert this data accordingly.

mcp_servers:
  # Context7 - Contextual documentation search
  - name: context7
    command: pnpm
    args:
      - "dlx"
      - "@upstash/context7-mcp@2.2.3"
    startup_timeout_sec: 30
    supports:
      - codex
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed

  # Linear - Project management
  - name: linear
    # URL-based MCP (remote)
    url: "https://mcp.linear.app/mcp"
    # For tools that need command-based config
    command: pnpm
    args:
      - "dlx"
      - "mcp-remote@0.1.38"
      - "https://mcp.linear.app/mcp"
    # Codex starts configured MCP servers at session startup. Keep OAuth-based
    # remote servers out of Codex by default to avoid login warnings.
    supports:
      - claude-code
      - cursor
      - gemini
      - vscode

  # GitHub - GitHub API integration
  - name: github
    command: pnpm
    args:
      - "dlx"
      - "@modelcontextprotocol/server-github@2025.4.8"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GH_TOKEN}"
    supports:
      - cursor
      - gemini
      - claude-desktop
      - vscode
      - windsurf
      - zed

  # DeepWiki - Wiki and docs search
  - name: deepwiki
    # URL-based MCP (remote) - Codex uses native Streamable HTTP
    url: "https://mcp.deepwiki.com/mcp"
    # For tools that need command-based config (stdio bridge)
    command: pnpm
    args:
      - "dlx"
      - "mcp-remote@0.1.38"
      - "https://mcp.deepwiki.com/mcp"
    startup_timeout_sec: 30
    supports:
      - codex
      - claude-code
      - cursor
      - gemini

  # Tavily - AI-powered web search and extraction (Docker MCP SDK)
  - name: tavily
    command: docker
    args:
      - "run"
      - "-i"
      - "--rm"
      - "-e"
      - "TAVILY_API_KEY"
      - "mcp/tavily"
    startup_timeout_sec: 300
    env:
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
    op_env:
      TAVILY_API_KEY: "op://openclaw/TavilyUsedOpenclawPAT/credential"
    # API-key Docker MCP servers fail Codex startup when the local env vars are
    # absent, so keep them available to clients that can launch them on demand.
    supports:
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # Exa - AI-powered web search and crawling (Docker MCP SDK)
  - name: exa
    command: docker
    args:
      - "run"
      - "-i"
      - "--rm"
      - "-e"
      - "EXA_API_KEY"
      - "mcp/exa"
    startup_timeout_sec: 300
    env:
      EXA_API_KEY: "${EXA_API_KEY}"
    op_env:
      EXA_API_KEY: "op://openclaw/ExaUsedOpenclawPAT/credential"
    # API-key Docker MCP servers fail Codex startup when the local env vars are
    # absent, so keep them available to clients that can launch them on demand.
    supports:
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # Firecrawl - Web scraping and content extraction (Docker MCP SDK)
  - name: firecrawl
    command: docker
    args:
      - "run"
      - "-i"
      - "--rm"
      - "-e"
      - "FIRECRAWL_API_KEY"
      - "mcp/firecrawl"
    startup_timeout_sec: 300
    env:
      FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY}"
    op_env:
      FIRECRAWL_API_KEY: "op://openclaw/FirecrawlUsedOpenclawPAT/credential"
    # API-key Docker MCP servers fail Codex startup when the local env vars are
    # absent, so keep them available to clients that can launch them on demand.
    supports:
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # Draw.io Official - Open diagrams in draw.io editor (browser)
  - name: drawio
    command: pnpm
    args:
      - "dlx"
      - "@drawio/mcp@1.2.6"
    startup_timeout_sec: 30
    supports:
      - codex
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # Sentry - Error monitoring and debugging (OAuth via remote URL)
  - name: sentry
    # URL-based MCP (remote) - Codex uses native Streamable HTTP
    url: "https://mcp.sentry.dev/mcp"
    # For tools that need command-based config (stdio bridge)
    command: pnpm
    args:
      - "dlx"
      - "mcp-remote@0.1.38"
      - "https://mcp.sentry.dev/mcp"
    startup_timeout_sec: 30
    # Codex starts configured MCP servers at session startup. Keep OAuth-based
    # remote servers out of Codex by default to avoid login warnings.
    supports:
      - claude-code
      - cursor
      - gemini
      - vscode

  # Cloud Run - Google Cloud Run integration
  - name: cloud-run
    command: pnpm
    args:
      - "dlx"
      - "@google-cloud/cloud-run-mcp@1.10.0"
    startup_timeout_sec: 120
    # Cloud Run MCP depends on local Google Cloud auth and currently exits
    # before the MCP handshake in Codex startup.
    supports:
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # Kaggle - Official remote MCP (competitions, datasets, notebooks, models, benchmarks)
  # Docs: https://www.kaggle.com/docs/mcp
  - name: kaggle
    # URL-based MCP (remote). Codex uses native Streamable HTTP; stdio-only
    # clients use the mcp-remote bridge below.
    url: "https://www.kaggle.com/mcp"
    # stdio bridge for tools that don't speak HTTP MCP natively
    command: pnpm
    args:
      - "dlx"
      - "mcp-remote@0.1.38"
      - "https://www.kaggle.com/mcp"
    startup_timeout_sec: 30
    supports:
      - claude-code
      - claude-desktop
      - cursor
      - gemini
      - vscode
      - windsurf
      - zed

  # Playwright - Browser automation MCP (Codex and VS Code)
  # --isolated: セッションごとに独立したブラウザを起動し、複数セッション間の競合を防ぐ
  - name: playwright
    command: pnpm
    args:
      - "dlx"
      - "@playwright/mcp@0.0.75"
      - "--isolated"
    startup_timeout_sec: 60
    supports:
      - codex
      - vscode

  # SuperLocalMemory - Local-only memory service (HTTP, machine-local)
  - name: superlocalmemory
    url: "http://localhost:3000/mcp"
    supports:
      - vscode

  # QMD - Local-only quick memory drawer (HTTP, machine-local)
  - name: qmd
    url: "http://localhost:3001/mcp"
    supports:
      - vscode
