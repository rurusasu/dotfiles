# Unified MCP Server Configuration
# Used by: Claude Code, Codex CLI, Cursor, Gemini CLI
#
# Each tool has different config formats, so templates convert this data accordingly.

mcp_servers:
  # Context7 - Contextual documentation search
  - name: context7
    command: pnpm
    args:
      - "dlx"
      - "@upstash/context7-mcp@latest"
    startup_timeout_sec: 30
    # Supported by: codex, claude-code
    supports:
      - codex
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed

  # Linear - Project management
  - name: linear
    # URL-based MCP (remote)
    url: "https://mcp.linear.app/mcp"
    # For tools that need command-based config
    command: pnpm
    args:
      - "dlx"
      - "mcp-remote"
      - "https://mcp.linear.app/mcp"
    supports:
      - codex
      - claude-code
      - cursor
      - gemini

  # Serena - Code intelligence
  - name: serena
    command: uvx
    args:
      - "--from"
      - "git+https://github.com/oraios/serena"
      - "serena"
      - "start-mcp-server"
    startup_timeout_sec: 60
    supports:
      - codex
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # GitHub - GitHub API integration
  - name: github
    command: pnpm
    args:
      - "dlx"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GH_TOKEN}"
    supports:
      - cursor
      - gemini
      - claude-desktop
      - vscode
      - windsurf
      - zed

  # DeepWiki - Wiki and docs search
  - name: deepwiki
    # URL-based MCP (remote) - Codex uses native Streamable HTTP
    url: "https://mcp.deepwiki.com/mcp"
    # For tools that need command-based config (stdio bridge)
    command: pnpm
    args:
      - "dlx"
      - "mcp-remote"
      - "https://mcp.deepwiki.com/mcp"
    startup_timeout_sec: 30
    supports:
      - codex
      - claude-code
      - cursor
      - gemini

  # Tavily - AI-powered web search and extraction (Docker MCP SDK)
  - name: tavily
    command: docker
    args:
      - "run"
      - "-i"
      - "--rm"
      - "-e"
      - "TAVILY_API_KEY"
      - "mcp/tavily"
    startup_timeout_sec: 60
    env:
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
    op_env:
      TAVILY_API_KEY: "op://openclaw/TavilyUsedOpenclawPAT/credential"
    supports:
      - codex
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # Exa - AI-powered web search and crawling (Docker MCP SDK)
  - name: exa
    command: docker
    args:
      - "run"
      - "-i"
      - "--rm"
      - "-e"
      - "EXA_API_KEY"
      - "mcp/exa"
    startup_timeout_sec: 60
    env:
      EXA_API_KEY: "${EXA_API_KEY}"
    op_env:
      EXA_API_KEY: "op://openclaw/ExaUsedOpenclawPAT/credential"
    supports:
      - codex
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # Firecrawl - Web scraping and content extraction (Docker MCP SDK)
  - name: firecrawl
    command: docker
    args:
      - "run"
      - "-i"
      - "--rm"
      - "-e"
      - "FIRECRAWL_API_KEY"
      - "mcp/firecrawl"
    startup_timeout_sec: 60
    env:
      FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY}"
    op_env:
      FIRECRAWL_API_KEY: "op://openclaw/FirecrawlUsedOpenclawPAT/credential"
    supports:
      - codex
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # Draw.io Official - Open diagrams in draw.io editor (browser)
  - name: drawio
    command: pnpm
    args:
      - "dlx"
      - "@drawio/mcp"
    startup_timeout_sec: 30
    supports:
      - codex
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # Sentry - Error monitoring and debugging (OAuth via remote URL)
  - name: sentry
    # URL-based MCP (remote) - Codex uses native Streamable HTTP
    url: "https://mcp.sentry.dev/mcp"
    # For tools that need command-based config (stdio bridge)
    command: pnpm
    args:
      - "dlx"
      - "mcp-remote"
      - "https://mcp.sentry.dev/mcp"
    startup_timeout_sec: 30
    supports:
      - codex
      - claude-code
      - cursor
      - gemini

  # Cloud Run - Google Cloud Run integration
  - name: cloud-run
    command: pnpm
    args:
      - "dlx"
      - "@google-cloud/cloud-run-mcp"
    startup_timeout_sec: 120
    supports:
      - codex
      - claude-code
      - claude-desktop
      - vscode
      - windsurf
      - zed
      - cursor
      - gemini

  # SuperLocalMemory - Kind クラスタ内で動作 (streamable-http via supergateway)
  - name: superlocalmemory
    url: "http://localhost:3000/mcp"
    supports:
      - claude-code
      - claude-desktop
      - codex
      - gemini
      - cursor
      - vscode
      - windsurf
      - zed

  # QMD - Kind クラスタ内で動作 (streamable-http via supergateway, read-only memory)
  - name: qmd
    url: "http://localhost:3001/mcp"
    supports:
      - claude-code
      - claude-desktop
      - codex
      - gemini
      - cursor
      - vscode
      - windsurf
      - zed
