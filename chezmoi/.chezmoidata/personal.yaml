# Git identity for multi-account setup (rendered into ~/.gitconfig and ~/.gitconfig-work).
#
# personal: applied as base identity for all repos
# work:     applied as override when repo remote uses git@github-work:... alias
#           (loaded via [includeIf "hasconfig:remote.*.url:..."] in ~/.gitconfig)
#
# Emails use GitHub noreply form to avoid exposing real addresses in public
# commit history. They're public-derivable from GitHub user IDs, so safe to
# commit to this public repo.
git:
  personal:
    name: "rurusasu"
    email: "36875744+rurusasu@users.noreply.github.com"
    signingkey: "~/.ssh/signing_key.pub"
  work:
    name: "Kohei Miki"
    email: "193406428+kohei-miki-im8@users.noreply.github.com"
    signingkey: "~/.ssh/github_work.pub"

