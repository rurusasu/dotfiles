# Git ユーザー情報（create_dot_gitconfig.tmpl から参照される）
# chezmoi.toml には [data.git] を持たせず、ここを唯一のソースとする
# PC ごとに変更したい場合は chezmoi edit-config で [data.git] を追加して上書き
git:
  name: "Kohei Miki"
  email: "rurusasu@gmail.com"
  signingkey: "~/.ssh/signing_key.pub"

# chezmoi テンプレート展開用フラグ（.chezmoiignore.tmpl で参照）
# install.cmd の同意状態は ~/.config/dotfiles/consent.json で別管理
# openclaw_enabled: removed — OpenClaw は openclaw-k8s リポジトリに移行済み
