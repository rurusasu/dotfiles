model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_verbosity = "low"
project_doc_fallback_filenames = [ "copilot-instructions.md" ]
approval_policy = "never"
sandbox_mode = "danger-full-access"

[sandbox_workspace_write]
exclude_slash_tmp = false
exclude_tmpdir_env_var = false
network_access = true
web_search = "live"
mcp_oauth_credentials_store = "auto"
hide_agent_reasoning = false
show_raw_agent_reasoning = false

[shell_environment_policy]
inherit = "all"
exclude = [
  "*KEY*",
  "*TOKEN*",
  "*SECRET*",
  "*PASSWORD*",
  "*CREDENTIAL*",
]

[shell_environment_policy.set]
TERM = "xterm-256color"
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"

[features]
elevated_windows_sandbox = true
shell_snapshot = true
multi_agent = true
hooks = true
unified_exec = true
undo = true
memories = true
prevent_idle_sleep = true
enable_request_compression = true
suppress_unstable_features_warning = true
apps = true

[tools]
view_image = true

[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.codex/hooks/claude_permission_policy.py"'
command_windows = "pwsh -NoLogo -NoProfile -NonInteractive -Command \"$root = git rev-parse --show-toplevel; python (Join-Path $root '.codex/hooks/claude_permission_policy.py')\""
timeout = 30
statusMessage = "Checking Claude-aligned Bash policy"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.codex/hooks/deny_protected_branch_commit.py"'
command_windows = "pwsh -NoLogo -NoProfile -NonInteractive -Command \"$root = git rev-parse --show-toplevel; python (Join-Path $root '.codex/hooks/deny_protected_branch_commit.py')\""
timeout = 30
statusMessage = "Checking protected branch policy"

[[skills.config]]
name = "python-clean-architecture"
path = "~/.codex/skills/python-clean-architecture"
enabled = true

[[skills.config]]
name = "python-docstring"
path = "~/.codex/skills/python-docstring"
enabled = true

[agents]
max_threads = 12
max_depth = 2
job_max_runtime_seconds = 3600

[agents.fast_worker]
description = "Fast scoped implementation agent."
config_file = "agents/fast_worker.toml"

[agents.python_coding]
description = "Python implementation-only agent (no test execution)."
config_file = "agents/python_coding.toml"

