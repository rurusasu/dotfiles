repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: fix-byte-order-marker
        types: [powershell]
  - repo: local
    hooks:
      - id: treefmt
        name: treefmt
        entry: nix fmt -- --fail-on-change
        language: system
        pass_filenames: false
      - id: powershell-tests
        name: powershell tests
        entry: scripts/sh/run-windows-powershell-tests.sh -NoProfile -Command "& ./scripts/powershell/tests/Invoke-Tests.ps1 -MinimumCoverage 80"
        language: system
        pass_filenames: false
        types: [powershell]
      - id: chezmoi-template-lint
        name: chezmoi template lint
        entry: scripts/sh/run-windows-powershell-tests.sh -NoProfile -Command "& ./scripts/powershell/tests/Invoke-Tests.ps1 -Path ./scripts/powershell/tests/chezmoi -MinimumCoverage 0"
        language: system
        pass_filenames: false
        files: '\.tmpl$'
      - id: hermes-bootstrap-tests
        name: hermes bootstrap container tests
        entry: task hermes:bootstrap:test
        language: system
        pass_filenames: false
        require_serial: true
        files: '^(docker/hermes-agent/.*|Taskfile\.yml|\.pre-commit-config\.yaml|\.github/workflows/ci-hermes-bootstrap\.yml)$'
